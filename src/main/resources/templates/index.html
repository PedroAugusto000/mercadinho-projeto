<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadinho Online</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }

		.product-card img {
		    width: 100%;
		    height: auto;
		    max-height: 250px; /* Ajusta a altura máxima sem cortar */
		    object-fit: contain; /* Exibe a imagem inteira sem cortes */
		    border-radius: 5px;
		    background-color: #fff; /* Garante que o fundo fique branco se a imagem não preencher o espaço */
		    padding: 5px; /* Dá um respiro se a imagem for menor que o card */
		}
		
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">LOGO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <form class="d-flex mx-auto" role="search">
                    <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">Buscar</button>
                </form>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Entrar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="fas fa-shopping-cart"></i> Carrinho</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="text-center text-success">Produtos Disponíveis</h2>
        <div class="row">
            <div class="col-md-4 mb-4" th:each="produto : ${produtos}">
                <div class="card product-card">
					<img th:src="@{'/' + ${produto.imagemPath}}" class="card-img-top" alt="Imagem do Produto">
                    <div class="card-body text-center">
                        <h5 class="card-title" th:text="${produto.nome}"></h5>
                        <p class="card-text text-success">R$ <span th:text="${produto.preco}"></span></p>
                        <p class="card-text"><strong>Categoria:</strong> <span th:text="${produto.categoria}"></span></p>
                        <a href="#" class="btn btn-primary">Adicionar ao Carrinho</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
