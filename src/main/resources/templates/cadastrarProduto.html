<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD de Produtos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f0fdf4;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-success text-center">Cadastrar produtos</h2>
        
        <!-- Formulário para adicionar produto -->
        <form action="/produtos/salvar" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="name" class="form-label">Nome do Produto</label>
                <input type="text" class="form-control" name="nome" required>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Preço</label>
                <input type="number" class="form-control" name="preco" required>
            </div>
            <div class="mb-3">
                <label for="category" class="form-label">Categoria</label>
                <select class="form-control" name="categoria">
                    <option>Limpeza</option>
                    <option>Comida</option>
                    <option>Higiene</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="image" class="form-label">Imagem do Produto</label>
                <input type="file" class="form-control" name="imagem" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-success">Adicionar Produto</button>
        </form>
        
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
