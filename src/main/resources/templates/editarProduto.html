<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f0fdf4;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-warning text-center">Editar Produto</h2>
        
        <form action="/produtos/atualizar" method="post">
            <input type="hidden" name="id" th:value="${produto.id}">
            
            <div class="mb-3">
                <label for="name" class="form-label">Nome do Produto</label>
                <input type="text" class="form-control" name="nome" th:value="${produto.nome}" required>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Preço</label>
                <input type="number" class="form-control" name="preco" th:value="${produto.preco}" required>
            </div>
            <div class="mb-3">
                <label for="category" class="form-label">Categoria</label>
                <select class="form-control" name="categoria">
                    <option value="Limpeza" th:selected="${produto.categoria == 'Limpeza'}">Limpeza</option>
                    <option value="Comida" th:selected="${produto.categoria == 'Comida'}">Comida</option>
                    <option value="Higiene" th:selected="${produto.categoria == 'Higiene'}">Higiene</option>
                </select>
            </div>
            <button type="submit" class="btn btn-warning">Atualizar Produto</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
